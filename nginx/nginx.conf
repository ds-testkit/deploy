events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Логи (при необходимости раскомментируйте пути)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    upstream frontend_upstream {
        server frontend:3000;
        keepalive 16;
    }

    upstream backend_upstream {
        server backend:8000;
        keepalive 8;
    }

    # HTTP → HTTPS + ACME
    server {
        listen 80;
        listen [::]:80;
        server_name velikoss.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name velikoss.ru;

        ssl_certificate /etc/letsencrypt/live/velikoss.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/velikoss.ru/privkey.pem;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        client_max_body_size 25m;

        # API (до location /)
        location /api/v1/ {
            proxy_pass http://backend_upstream/api/v1/; 
        }

        location /openapi.json {
            proxy_pass http://backend_upstream/openapi.json;
        }

        location /docs {
            proxy_pass http://backend_upstream/docs;
        }

        # Uptime Kuma — WebSocket
        location /status/ {
            proxy_pass http://uptime-kuma:3001/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
        }

        # Хэшированные ассеты SvelteKit (^~ важнее regex — иначе .js попадает в location ниже)
        location ^~ /_app/ {
            proxy_pass http://frontend_upstream;
                        proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # Статика из frontend/static (без .js — иначе дублируются заголовки кэша с /_app/)
        location ~* \.(?:png|jpe?g|gif|ico|svg|webp|woff2?|css)$ {
            proxy_pass http://frontend_upstream;
                        proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=7d" always;
        }

        # HTML и навигация — не кэшировать (после деплоя иначе старый app.* тянет удалённые chunks)
        location / {
            proxy_pass http://frontend_upstream;
                        proxy_hide_header Cache-Control;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }
    }
}
