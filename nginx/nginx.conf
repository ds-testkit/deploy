events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Docker embedded DNS — перерезолвить backend/frontend после рестарта контейнеров
    resolver 127.0.0.11 valid=10s ipv6=off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    # HTTP → HTTPS + ACME
    server {
        listen 80;
        listen [::]:80;
        server_name velikoss.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name velikoss.ru;

        ssl_certificate /etc/letsencrypt/live/velikoss.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/velikoss.ru/privkey.pem;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        client_max_body_size 25m;

        # API (переменный proxy_pass — иначе nginx кэширует IP backend при рестарте)
        location /api/v1/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream$request_uri;
        }

        # MinIO S3 API (presigned download/upload URLs)
        # rewrite обязателен: при proxy_pass через переменную nginx НЕ срезает
        # префикс location — без rewrite MinIO получает /minio/ttm-files/... и
        # ищет bucket «minio» → 404 (объект лежит в bucket ttm-files).
        location /minio/ {
            rewrite ^/minio/?(.*)$ /$1 break;
            set $minio_upstream http://minio:9000;
            proxy_pass $minio_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            client_max_body_size 25m;
        }

        # AI microservice (SSE — proxy_buffering off)
        location /api/ai/ {
            set $ai_upstream http://ai-service:8100;
            rewrite ^/api/ai/?(.*)$ /$1 break;
            proxy_pass $ai_upstream;
            proxy_read_timeout 300s;
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream$request_uri;
        }

        location /docs {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream$request_uri;
        }

        # Uptime Kuma — WebSocket
        location /status/ {
            rewrite ^/status/?(.*)$ /$1 break;
            set $kuma_upstream http://uptime-kuma:3001;
            proxy_pass $kuma_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
        }

        location ^~ /_app/ {
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream$request_uri;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location ~* \.(?:png|jpe?g|gif|ico|svg|webp|woff2?|css)$ {
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream$request_uri;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=7d" always;
        }

        location / {
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream$request_uri;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }
    }
}
