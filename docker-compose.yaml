services:
  frontend:
    image: ghcr.io/ds-testkit/frontend:latest
    platform: linux/arm64
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # SvelteKit behind nginx (see adapter-node docs)
      ORIGIN: ${PUBLIC_ORIGIN:-https://velikoss.ru}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      # Browser uses same origin; SSR/container calls backend by service name
      PUBLIC_API_URL: ${PUBLIC_API_URL:-}
      # Пусто = браузер использует same-origin /api/ai (см. aiClient.ts)
      PUBLIC_AI_SERVICE_URL: ${PUBLIC_AI_SERVICE_URL:-}
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  backend:
    image: ghcr.io/ds-testkit/backend:latest
    platform: linux/arm64
    environment:
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      SKIP_APP_MIGRATIONS: "1"
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://velikoss.ru}
      PUBLIC_APP_URL: ${PUBLIC_ORIGIN:-https://velikoss.ru}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5

  ai-service:
    image: ghcr.io/ds-testkit/ai:latest
    platform: linux/arm64
    environment:
      JWT_SECRET: ${SECRET_KEY}
      JWT_ALGORITHM: HS256
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MAX_TASKS: ${AI_MAX_TASKS:-80}
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-120000}
      PORT: 8100
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
  uptime-kuma:
    image: louislam/uptime-kuma:1
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  uptime_kuma_data: